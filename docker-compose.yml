services:
  postgres:
    image: postgres:16-alpine
    container_name: curex24-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: curex24
      POSTGRES_PASSWORD: curex24password
      POSTGRES_DB: curex24
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U curex24"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: curex24-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: curex24-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://curex24:curex24password@postgres:5432/curex24
      DIRECT_URL: postgresql://curex24:curex24password@postgres:5432/curex24
      JWT_SECRET: ${JWT_SECRET:-curex24-super-secret-jwt-key-change-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      NODE_ENV: development
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy

  admin:
    build:
      context: .
      dockerfile: apps/admin/Dockerfile
      args:
        # NEXT_PUBLIC_API_URL is used by the browser (client-side), not by the
        # container itself, so localhost:3000 is correct — Docker exposes the
        # API port on the host's localhost.
        NEXT_PUBLIC_API_URL: http://localhost:3000
    container_name: curex24-admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
