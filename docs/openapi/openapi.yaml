    ErrorResponse:
      type: object
      description: Standard error response returned by all endpoints on failure
      required: [success, statusCode, timestamp, path, error]
      properties:
        success:
          type: boolean
          example: false
        statusCode:
          type: integer
          example: 400
        timestamp:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00.000Z"
        path:
          type: string
          example: "/api/v1/auth/send-otp"
        error:
          type: string
          example: "Validation failed"

    PaginatedResponse:
      type: object
      description: Wrapper for paginated list responses
      properties:
        data:
          type: array
          items: {}
          description: Array of result items
        total:
          type: integer
          description: Total number of matching records
          example: 142
        page:
          type: integer
          description: Current page number
          example: 1
        limit:
          type: integer
          description: Results per page
          example: 20
