      type: object
      required: [lat, lng, serviceCategory, urgency]
      properties:
        lat:
          type: number
          format: double
          minimum: -90
          maximum: 90
          example: 12.9716
        lng:
          type: number
          format: double
          minimum: -180
          maximum: 180
          example: 77.5946
        serviceCategory:
          type: string
          example: general-consultation
        urgency:
          type: string
          enum: [LOW, MEDIUM, HIGH]

    RecommendationResponse:
      type: object
      description: AI-powered provider recommendation comparing home visit and doctor place options
      properties:
        homeVisit:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/RecommendationOption"
        doctorPlace:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/RecommendationOption"
        recommended:
          type: string
          enum: [HOME_VISIT, DOCTOR_PLACE]
          nullable: true
          description: The recommended booking mode, or null if no providers available
        reason:
          type: string
          example: Home visit recommended due to high urgency and provider proximity

    RecommendationOption:
      type: object
      description: A single recommendation option (home visit or doctor place)
      properties:
        provider:
          $ref: "#/components/schemas/ProviderProfile"
        distance:
          type: number
          format: double
          description: Distance in kilometers
          example: 3.5
        eta:
          type: number
          format: double
          description: Estimated time of arrival in minutes
          example: 15
        fee:
          type: number
          format: double
          description: Consultation fee
          example: 800
        score:
          type: number
          format: double
          description: Recommendation score (higher is better)
          example: 0.85

