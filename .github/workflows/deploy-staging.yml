name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: staging-deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Typecheck shared types
        run: pnpm --filter @curex24/types lint

      - name: Lint and typecheck API
        run: pnpm --filter @curex24/api lint

      - name: Lint admin panel
        run: pnpm --filter @curex24/admin lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Build shared types
        run: pnpm --filter @curex24/types build

      - name: Build API
        run: pnpm --filter @curex24/api build

      - name: Build admin panel
        run: pnpm --filter @curex24/admin build
        env:
          NEXT_PUBLIC_API_URL: https://api.staging.curex24.com/api/v1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: curex24_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/curex24_test
      DIRECT_URL: postgresql://test:test@localhost:5432/curex24_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate

      - name: Push schema to test DB
        run: cd packages/database && npx prisma db push --skip-generate

      - name: Run API tests
        run: pnpm --filter @curex24/api test -- --passWithNoTests --forceExit

      - name: Run mobile tests
        run: pnpm --filter @curex24/mobile test -- --passWithNoTests --forceExit

  # ────────────────────────────────────────────────────────────
  # Deploy API to Railway (staging environment)
  # ────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway (staging)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test]
    permissions:
      contents: read
    environment:
      name: staging
      url: https://api.staging.curex24.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

      - name: Apply database migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.STAGING_DIRECT_URL }}

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ vars.RAILWAY_STAGING_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        run: sleep 30

      - name: Verify staging API health
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.staging.curex24.com/ > /dev/null 2>&1; then
              echo "✅ Staging API is healthy"
              exit 0
            fi
            echo "⏳ Attempt $i — waiting 15s..."
            sleep 15
          done
          echo "⚠️  Health check did not pass after 5 attempts"

      - name: Deployment summary
        run: |
          echo "## 🚀 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Platform |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.staging.curex24.com | Railway |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | https://admin.staging.curex24.com | Vercel |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`develop\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
