name: PR Size Check

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  pr-size:
    name: PR Size Warning
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      pull-requests: write
      issues: write
    steps:
      - name: Check PR size and add labels
        uses: actions/github-script@v7
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const totalChanges = pr.additions + pr.deletions;

            let sizeLabel;
            if (totalChanges > 500) {
              sizeLabel = 'size: large';
            } else if (totalChanges >= 200) {
              sizeLabel = 'size: medium';
            } else {
              sizeLabel = 'size: small';
            }

            // Remove existing size labels
            const { data: labels } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const sizeLabels = ['size: large', 'size: medium', 'size: small'];
            for (const label of labels) {
              if (sizeLabels.includes(label.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  name: label.name,
                });
              }
            }

            // Create label if it doesn't exist
            const labelColors = {
              'size: large': 'B60205',
              'size: medium': 'FBCA04',
              'size: small': '0E8A16',
            };

            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: sizeLabel,
              });
            } catch (e) {
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: sizeLabel,
                color: labelColors[sizeLabel],
              });
            }

            // Add the appropriate size label
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [sizeLabel],
            });

            // Add a comment if the PR is too large
            if (totalChanges > 500) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: `⚠️ **Large PR Warning**\n\nThis PR has **${pr.additions} additions** and **${pr.deletions} deletions** (${totalChanges} total lines changed), which exceeds the recommended limit of 500 lines.\n\nConsider breaking this PR into smaller, more focused changes to make review easier and reduce the risk of introducing bugs.`,
              });
            }
