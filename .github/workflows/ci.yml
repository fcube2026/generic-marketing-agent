name: CI

on:
  schedule:
    - cron: "30 1,4,7,10,13,16 * * *"  # every 3h, 07:00–23:00 IST (UTC+5:30)
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Typecheck shared types package
        run: pnpm --filter @curex24/types lint

      - name: Prettier format check API
        run: pnpm --filter @curex24/api format:check

      - name: Lint and typecheck API
        run: pnpm --filter @curex24/api lint

      - name: Lint admin panel
        run: pnpm --filter @curex24/admin lint

      - name: Lint doctor portal
        run: pnpm --filter @curex24/doctor-portal lint

      - name: Typecheck admin panel
        run: cd apps/admin && npx tsc --noEmit

      - name: Validate admin test coverage
        run: pnpm --filter @curex24/admin test:coverage-check

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Build shared types package
        run: pnpm --filter @curex24/types build

      - name: Build API
        run: pnpm --filter @curex24/api build

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: apps/admin/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('apps/admin/**/*.{js,jsx,ts,tsx}') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Build admin panel
        run: pnpm --filter @curex24/admin build

      - name: Build doctor portal
        run: pnpm --filter @curex24/doctor-portal build

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: curex24_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
        DATABASE_URL: postgresql://test:test@localhost:5432/curex24_test
        DIRECT_URL: postgresql://test:test@localhost:5432/curex24_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate

      - name: Push schema to test DB
        run: cd packages/database && pnpm exec prisma db push --skip-generate

      - name: Run API tests
        run: pnpm --filter @curex24/api test -- --passWithNoTests --forceExit

  test-mobile:
    name: Test Mobile
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mobile tests
        run: pnpm --filter @curex24/mobile test -- --passWithNoTests --forceExit
        env:
          # The VideoLobbyScreen suite (expo-camera + Animated animations) needs
          # ~2 GB heap. Raise the V8 limit on the worker process so it doesn't
          # hit the default 2 GB ceiling on the ubuntu-latest 7 GB runner.
          NODE_OPTIONS: "--max-old-space-size=4096"

  admin-smoke-tests:
    name: Admin Smoke Tests (Dev)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @curex24/admin exec playwright install --with-deps chromium

      - name: Build admin panel
        run: pnpm --filter @curex24/admin build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3000/api/v1

      - name: Start admin panel
        run: pnpm --filter @curex24/admin start &
        env:
          PORT: 3001

      - name: Wait for admin to be ready
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001 > /dev/null 2>&1; then
              echo "Admin is ready"
              break
            fi
            echo "Waiting for admin to start (attempt $i)..."
            sleep 3
          done

      - name: Run smoke tests
        run: pnpm --filter @curex24/admin exec playwright test -c playwright.config.ts --grep @smoke --project=chromium
        env:
          ADMIN_BASE_URL: http://localhost:3001
          ADMIN_TEST_EMAIL: ${{ secrets.ADMIN_TEST_EMAIL }}
          ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-dev-${{ github.run_id }}
          path: apps/admin/playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-dev-${{ github.run_id }}
          path: apps/admin/test-results/
          retention-days: 7

      - name: GitHub Step Summary
        if: always()
        run: |
          echo "## Admin Smoke Tests (Dev)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Dev (http://localhost:3001)" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** PR / push to ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/admin/test-results/results.json ]; then
            PASSED=$(python3 -c "import json; print(json.load(open('apps/admin/test-results/results.json')).get('stats', {}).get('expected', 0))" 2>/dev/null || echo "N/A")
            FAILED=$(python3 -c "import json; print(json.load(open('apps/admin/test-results/results.json')).get('stats', {}).get('unexpected', 0))" 2>/dev/null || echo "N/A")
            echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Report artifact: playwright-report-dev-${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

  prisma-validate:
    name: Prisma Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate Prisma schema
        run: cd packages/database && pnpm exec prisma validate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Check Prisma schema formatting
        run: |
          npx --prefix packages/database prisma format --schema packages/database/prisma/schema.prisma
          git diff --exit-code -- packages/database/prisma/schema.prisma
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"
          DIRECT_URL: "postgresql://user:pass@localhost:5432/dummy"
