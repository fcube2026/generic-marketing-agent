name: Deploy Production

on:
  push:
    branches: [main]
    # Only deploy when these paths change (skip docs-only changes)
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'labels/**'

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false # Never cancel production deploys

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Typecheck shared types
        run: pnpm --filter @curex24/types lint

      - name: Lint and typecheck API
        run: pnpm --filter @curex24/api lint

      - name: Lint admin panel
        run: pnpm --filter @curex24/admin lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Build shared types
        run: pnpm --filter @curex24/types build

      - name: Build API
        run: pnpm --filter @curex24/api build

      - name: Build admin panel
        run: pnpm --filter @curex24/admin build
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.PRODUCTION_API_URL }}

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: curex24_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/curex24_test
      DIRECT_URL: postgresql://test:test@localhost:5432/curex24_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate

      - name: Push schema to test DB
        run: cd packages/database && npx prisma db push --skip-generate

      - name: Run API tests
        run: pnpm --filter @curex24/api test -- --passWithNoTests --forceExit

      - name: Run mobile tests
        run: pnpm --filter @curex24/mobile test -- --passWithNoTests --forceExit

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test]
    permissions:
      contents: read
    environment:
      name: production
      url: ${{ vars.PRODUCTION_API_URL }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}

      # ── Apply database migrations ──────────────────────────────
      - name: Apply database migrations
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      # ── Deploy API backend ────────────────────────────────────
      # Uncomment and configure for your hosting provider.
      #
      # Example: Render deploy hook
      # - name: Deploy API to Render
      #   run: curl -X POST "${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK }}"

      - name: Verify production API health
        run: |
          echo "Waiting for production API to be ready..."
          sleep 10
          if [ -n "${{ vars.PRODUCTION_API_URL }}" ]; then
            curl -f "${{ vars.PRODUCTION_API_URL }}/" || echo "⚠️  Health check failed"
          else
            echo "⚠️  PRODUCTION_API_URL not set — skipping health check"
          fi

      - name: Deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ vars.PRODUCTION_API_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | ${{ vars.PRODUCTION_ADMIN_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
