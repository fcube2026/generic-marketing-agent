name: Deploy Production

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'labels/**'

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Typecheck shared types
        run: pnpm --filter @curex24/types lint

      - name: Lint and typecheck API
        run: pnpm --filter @curex24/api lint

      - name: Lint admin panel
        run: pnpm --filter @curex24/admin lint

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: "postgresql://user:pass@localhost:5432/dummy"

      - name: Build shared types
        run: pnpm --filter @curex24/types build

      - name: Build API
        run: pnpm --filter @curex24/api build

      - name: Build admin panel
        run: pnpm --filter @curex24/admin build
        env:
          NEXT_PUBLIC_API_URL: https://api.curex24.com/api/v1

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: lint-and-typecheck
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: curex24_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/curex24_test
      DIRECT_URL: postgresql://test:test@localhost:5432/curex24_test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @curex24/database db:generate

      - name: Push schema to test DB
        run: cd packages/database && npx prisma db push --skip-generate

      - name: Run API tests
        run: pnpm --filter @curex24/api test -- --passWithNoTests --forceExit

      - name: Run mobile tests
        run: pnpm --filter @curex24/mobile test -- --passWithNoTests --forceExit

  # ────────────────────────────────────────────────────────────
  # Deploy API to Railway (production environment)
  # ────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway (production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, test]
    permissions:
      contents: read
    environment:
      name: production
      url: https://api.curex24.com
    steps:
      - name: Check if production secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ RAILWAY_TOKEN not configured — skipping production deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check-secrets.outputs.skip != 'true'
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.check-secrets.outputs.skip != 'true'
        run: pnpm --filter @curex24/database db:generate
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      - name: Apply database migrations
        if: steps.check-secrets.outputs.skip != 'true'
        run: cd packages/database && npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
          DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}

      - name: Install Railway CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.check-secrets.outputs.skip != 'true'
        run: railway up --service ${{ vars.RAILWAY_PRODUCTION_SERVICE_ID }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for deployment
        if: steps.check-secrets.outputs.skip != 'true'
        run: sleep 30

      - name: Verify production API health
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf https://api.curex24.com/ > /dev/null 2>&1; then
              echo "✅ Production API is healthy"
              exit 0
            fi
            echo "⏳ Attempt $i — waiting 15s..."
            sleep 15
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Deployment summary
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Platform |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| API | https://api.curex24.com | Railway |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | https://admin.curex24.com | Vercel |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`main\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

  # ────────────────────────────────────────────────────────────
  # Deploy Admin Dashboard to Vercel (production environment)
  # ────────────────────────────────────────────────────────────
  deploy-admin:
    name: Deploy Admin → Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test]
    permissions:
      contents: read
    environment:
      name: production
      url: https://admin.curex24.com
    steps:
      - name: Check if Vercel secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ VERCEL_TOKEN not configured — skipping admin deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g vercel

      - name: Pull Vercel environment
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Build with Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
          NEXT_PUBLIC_API_URL: https://api.curex24.com/api/v1

      - name: Deploy to Vercel (production)
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/admin
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}

      - name: Admin production deploy summary
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          echo "## ✅ Admin Dashboard Deployed (Production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Platform |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Admin | https://admin.curex24.com | Vercel |" >> $GITHUB_STEP_SUMMARY

  admin-smoke-tests-production:
    name: Admin Smoke Tests (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [deploy-admin, deploy-api]
    permissions:
      contents: write
      issues: write
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @curex24/admin exec playwright install --with-deps chromium

      - name: Wait for production admin to be available
        run: |
          for i in $(seq 1 10); do
            if curl -sf https://admin.curex24.com > /dev/null 2>&1; then
              echo "Production admin is available"
              break
            fi
            echo "Waiting for production deploy to propagate (attempt $i)..."
            sleep 15
          done

      - name: Run smoke tests (production)
        id: smoke
        continue-on-error: true
        run: pnpm --filter @curex24/admin test:e2e:smoke -- --project=chromium
        env:
          ADMIN_BASE_URL: https://admin.curex24.com
          ADMIN_TEST_EMAIL: ${{ secrets.ADMIN_TEST_EMAIL }}
          ADMIN_TEST_PASSWORD: ${{ secrets.ADMIN_TEST_PASSWORD }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production-${{ github.run_id }}
          path: apps/admin/playwright-report/
          retention-days: 30

      - name: Upload JSON test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-production-${{ github.run_id }}
          path: apps/admin/test-results/
          retention-days: 30

      - name: GitHub Step Summary
        if: always()
        run: |
          echo "## Admin Smoke Tests - Production" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** Production (https://admin.curex24.com)" >> $GITHUB_STEP_SUMMARY
          echo "**Result:** ${{ steps.smoke.outcome }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f apps/admin/test-results/results.json ]; then
            PASSED=$(python3 -c "import json; print(json.load(open('apps/admin/test-results/results.json')).get('stats', {}).get('expected', 0))" 2>/dev/null || echo "N/A")
            FAILED=$(python3 -c "import json; print(json.load(open('apps/admin/test-results/results.json')).get('stats', {}).get('unexpected', 0))" 2>/dev/null || echo "N/A")
            echo "| Result | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | ${PASSED} |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | ${FAILED} |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "Report artifact: playwright-report-production-${{ github.run_id }}" >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Issue on smoke test failure
        if: steps.smoke.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production Smoke Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: [
                '## Production Admin Smoke Test Failure',
                '',
                `**Environment:** https://admin.curex24.com`,
                `**Commit:** ${context.sha}`,
                `**Branch:** ${context.ref}`,
                `**Workflow Run:** [View details](${runUrl})`,
                '',
                '### Action Required',
                '- Review the Playwright report artifact attached to the workflow run.',
                '- Identify failing tests and triage whether this is a deployment issue or a regression.',
                '- If critical, consider rolling back the deployment.',
              ].join('\n'),
              labels: ['production-incident', 'automated-test-failure'],
            });
            console.log(`Created issue: ${issue.data.html_url}`);

      - name: Notify Slack on production smoke failure
        if: steps.smoke.outcome == 'failure'
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "PRODUCTION Admin Smoke Tests Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*PRODUCTION Admin Smoke Tests Failed*\n*URL:* https://admin.curex24.com\n*Commit:* `${{ github.sha }}`\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run> | <${{ github.server_url }}/${{ github.repository }}/issues|View Issues>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Fail job if smoke tests failed
        if: steps.smoke.outcome == 'failure'
        run: |
          echo "Production smoke tests failed."
          exit 1

  # ────────────────────────────────────────────────────────────
  # Deploy Marketing Agent to Vercel (production environment)
  # ────────────────────────────────────────────────────────────
  deploy-marketing-agent:
    name: Deploy Marketing Agent → Vercel (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build, test]
    permissions:
      contents: read
    environment:
      name: production
      url: https://growth.curex24.com
    steps:
      - name: Check if Vercel secrets are configured
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ VERCEL_TOKEN not configured — skipping marketing-agent deploy"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g vercel

      - name: Pull Vercel environment
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/marketing-agent
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_AGENT_PROJECT_ID }}

      - name: Build with Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: apps/marketing-agent
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_AGENT_PROJECT_ID }}

      - name: Deploy to Vercel (production)
        if: steps.check-secrets.outputs.skip != 'true'
        id: deploy-marketing-agent
        run: |
          OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | head -1)
          if [ -z "$DEPLOY_URL" ]; then
            echo "❌ Failed to extract deployment URL"
            exit 1
          fi
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"
        working-directory: apps/marketing-agent
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_AGENT_PROJECT_ID }}

      - name: Alias to production domain
        if: steps.check-secrets.outputs.skip != 'true'
        run: vercel alias set ${{ steps.deploy-marketing-agent.outputs.deploy_url }} growth.curex24.com --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }}
        working-directory: apps/marketing-agent
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_MARKETING_AGENT_PROJECT_ID }}

      - name: Marketing agent production deploy summary
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          echo "## ✅ Marketing Agent Deployed (Production)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL | Platform |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| Marketing Agent | https://growth.curex24.com | Vercel |" >> $GITHUB_STEP_SUMMARY
